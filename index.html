<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeoCrypto PWA</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NeoCrypto">
    
    <style>
        :root {
            /* Нова кольорова гама: Темно-синій FinTech */
            --bg-gradient: linear-gradient(135deg, #0B0E14 0%, #1A2130 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-color: #00E5FF; /* Неоновий блакитний */
            --danger-color: #FF2A55;
            --success-color: #00FF88;
            --text-color: #F8FAFC;
            --text-secondary: #94A3B8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            color: var(--text-color); 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
            min-height: 100vh;
            overflow-x: hidden; 
        }

        header { padding: 25px 20px 15px; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        
        .app-screen { display: none; padding: 10px 15px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .app-screen.active { display: block; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Нові картки Glassmorphism */
        .widget { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 15px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .balance-title { font-size: 13px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; }
        .balance-value { font-size: 38px; font-weight: 800; margin: 8px 0; background: linear-gradient(90deg, #fff, #94A3B8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Ринок */
        .segmented-control { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--card-border); }
        .segment-btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; color: var(--text-secondary); font-weight: 600; transition: all 0.3s; }
        .segment-btn.active { background: var(--accent-color); color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }

        .sort-controls { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sort-controls::-webkit-scrollbar { display: none; }
        .sort-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-secondary); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .sort-btn.active { color: var(--accent-color); border-color: var(--accent-color); background: rgba(0, 229, 255, 0.1); }

        .coin-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--card-border); }
        .coin-item:last-child { border-bottom: none; }
        .coin-info { display: flex; align-items: center; gap: 14px; }
        .coin-icon { width: 36px; height: 36px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .coin-price-info { text-align: right; }
        .text-green { color: var(--success-color); }
        .text-red { color: var(--danger-color); }
        .fav-star { font-size: 22px; color: rgba(255,255,255,0.2); transition: 0.3s; }
        .fav-star.active { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* Форма портфеля */
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); border-radius: 12px; color: white; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: var(--accent-color); }
        button.btn-submit { background: var(--accent-color); color: #000; font-weight: 700; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
        
        .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1A2130; border: 1px solid var(--card-border); border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-top: 8px;}
        .ac-item { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .ac-item:last-child { border-bottom: none; }

        .tradingview-container { height: 480px; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* Навігація Floating Bottom Bar */
        .bottom-nav { position: fixed; bottom: env(safe-area-inset-bottom); left: 15px; right: 15px; height: 70px; background: rgba(11, 14, 20, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--card-border); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 999; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 10px; font-weight: 600; width: 25%; background: none; border: none; transition: 0.3s; }
        .nav-item.active { color: var(--accent-color); transform: translateY(-3px); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <span id="screen-title">Огляд</span>
    </header>

    <div id="screen-dashboard" class="app-screen active">
        <div class="widget">
            <div class="balance-title">ЗАГАЛЬНИЙ БАЛАНС</div>
            <div class="balance-value" id="total-balance">$0.00</div>
        </div>
        <div class="widget" style="padding: 0; height: 250px; overflow: hidden; border: none;">
            <iframe src="https://s.tradingview.com/embed-widget/markets/?locale=uk#%7B%22filter%22%3A%22crypto%22%2C%22colorTheme%22%3A%22dark%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="screen-market" class="app-screen">
        <div class="segmented-control">
            <div class="segment-btn active" onclick="setMarketView('all', this)">Топ 100</div>
            <div class="segment-btn" onclick="setMarketView('fav', this)">Збережені</div>
        </div>

        <div class="sort-controls">
            <button class="sort-btn active" onclick="sortMarket('rank', this)">Капіталізація</button>
            <button class="sort-btn" onclick="sortMarket('price', this)">Ціна</button>
            <button class="sort-btn" onclick="sortMarket('change', this)">Зміна (24h)</button>
        </div>

        <div class="widget" style="padding: 10px 15px;">
            <div id="market-loading" style="text-align: center; padding: 20px; color: var(--text-secondary);">Оновлення даних...</div>
            <div id="market-list"></div>
        </div>
    </div>

    <div id="screen-analytics" class="app-screen">
        <div class="tradingview-container">
            <iframe src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=uk#%7B%22symbol%22%3A%22BINANCE%3ABTCUSDT%22%2C%22interval%22%3A%22D%22%2C%22theme%22%3A%22dark%22%2C%22style%22%3A%221%22%2C%22hide_side_toolbar%22%3Afalse%2C%22allow_symbol_change%22%3Atrue%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="screen-mydata" class="app-screen">
        <div class="widget">
            <h3 style="margin-bottom: 20px; font-weight: 700;">Нова транзакція</h3>
            <form id="crypto-form">
                <div class="input-group">
                    <input type="text" id="coin-name" placeholder="Пошук монети..." autocomplete="off" required>
                    <div id="autocomplete-results" class="autocomplete-dropdown"></div>
                </div>
                <div class="input-group">
                    <input type="number" step="any" id="coin-price" placeholder="Ціна ($)" required>
                </div>
                <div class="input-group">
                    <input type="number" step="any" id="coin-amount" placeholder="Кількість" required>
                </div>
                <button type="submit" class="btn-submit">Зберегти актив</button>
            </form>
        </div>

        <div class="widget">
            <h3 style="margin-bottom: 10px; font-weight: 700;">Ваші Активи</h3>
            <div id="portfolio-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('dashboard', 'Огляд', this)">
            <div class="nav-icon">◱</div>
            <div>Огляд</div>
        </button>
        <button class="nav-item" onclick="switchScreen('market', 'Крипторинок', this)">
            <div class="nav-icon">✦</div>
            <div>Ринок</div>
        </button>
        <button class="nav-item" onclick="switchScreen('analytics', 'Графіки', this)">
            <div class="nav-icon">𐂂</div>
            <div>Аналіз</div>
        </button>
        <button class="nav-item" onclick="switchScreen('mydata', 'Мій Портфель', this)">
            <div class="nav-icon">❖</div>
            <div>Активи</div>
        </button>
    </nav>

    <script>
        // Логіка залишається такою ж, як і в попередній версії
        let marketData = [];
        let currentMarketView = 'all';
        let currentSort = 'rank';
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
        let myPortfolio = JSON.parse(localStorage.getItem('myCryptoPortfolio')) || [];

        function switchScreen(screenId, title, element) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            document.getElementById('screen-title').innerText = title;
            element.classList.add('active');
        }

        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                marketData = await response.json();
                document.getElementById('market-loading').style.display = 'none';
                renderMarket();
            } catch (error) {
                document.getElementById('market-loading').innerText = 'Помилка мережі';
            }
        }

        function setMarketView(view, btn) {
            currentMarketView = view;
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMarket();
        }

        function sortMarket(sortType, btn) {
            currentSort = sortType;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMarket();
        }

        function renderMarket() {
            const listContainer = document.getElementById('market-list');
            listContainer.innerHTML = '';

            let displayData = currentMarketView === 'fav' ? marketData.filter(coin => myFavorites.includes(coin.id)) : [...marketData];

            if (displayData.length === 0 && currentMarketView === 'fav') {
                listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">Збережених монет немає</div>';
                return;
            }

            if (currentSort === 'price') displayData.sort((a, b) => b.current_price - a.current_price);
            else if (currentSort === 'change') displayData.sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
            else displayData.sort((a, b) => a.market_cap_rank - b.market_cap_rank);

            displayData.forEach(coin => {
                const isFav = myFavorites.includes(coin.id);
                const changeClass = coin.price_change_percentage_24h >= 0 ? 'text-green' : 'text-red';
                const changeSymbol = coin.price_change_percentage_24h >= 0 ? '+' : '';

                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `
                    <div class="coin-info">
                        <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav('${coin.id}')">★</span>
                        <img src="${coin.image}" class="coin-icon" alt="${coin.symbol}">
                        <div>
                            <div style="font-weight:700; font-size:15px;">${coin.symbol.toUpperCase()}</div>
                            <div style="font-size:12px; color:var(--text-secondary);">${coin.name}</div>
                        </div>
                    </div>
                    <div class="coin-price-info">
                        <div style="font-weight:700; font-size:15px;">$${coin.current_price.toLocaleString()}</div>
                        <div class="${changeClass}" style="font-size:12px; font-weight:600;">
                            ${changeSymbol}${coin.price_change_percentage_24h.toFixed(2)}%
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        window.toggleFav = function(coinId) {
            if (myFavorites.includes(coinId)) myFavorites = myFavorites.filter(id => id !== coinId);
            else myFavorites.push(coinId);
            localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
            renderMarket();
        }

        const searchInput = document.getElementById('coin-name');
        const priceInput = document.getElementById('coin-price');
        const acDropdown = document.getElementById('autocomplete-results');

        searchInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            acDropdown.innerHTML = '';
            if (!val) { acDropdown.style.display = 'none'; return; }

            const matches = marketData.filter(c => c.name.toLowerCase().includes(val) || c.symbol.toLowerCase().includes(val)).slice(0, 5);
            
            if (matches.length > 0) {
                acDropdown.style.display = 'block';
                matches.forEach(coin => {
                    const div = document.createElement('div');
                    div.className = 'ac-item';
                    div.innerHTML = `<img src="${coin.image}" style="width:24px; border-radius:50%;"> <span>${coin.name} (${coin.symbol.toUpperCase()})</span>`;
                    div.onclick = function() {
                        searchInput.value = coin.symbol.toUpperCase();
                        priceInput.value = coin.current_price;
                        acDropdown.style.display = 'none';
                    };
                    acDropdown.appendChild(div);
                });
            } else acDropdown.style.display = 'none';
        });

        document.addEventListener('click', (e) => { if (!searchInput.contains(e.target) && !acDropdown.contains(e.target)) acDropdown.style.display = 'none'; });

        function updatePortfolioUI() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = '';
            let totalInvested = 0;

            if (myPortfolio.length === 0) {
                list.innerHTML = '<div style="color:var(--text-secondary); text-align:center; margin-top:10px;">Портфель порожній</div>';
            }

            myPortfolio.forEach((item, index) => {
                const itemValue = item.amount * item.price;
                totalInvested += itemValue;

                const div = document.createElement('div');
                div.className = 'coin-item';
                div.innerHTML = `
                    <div>
                        <strong style="font-size:16px;">${item.name}</strong><br>
                        <span style="font-size:12px; color:var(--text-secondary);">${item.amount} шт. по $${item.price}</span>
                    </div>
                    <div style="text-align: right;">
                        <strong style="font-size:16px;">$${itemValue.toFixed(2)}</strong><br>
                        <span class="text-red" style="font-size:12px; cursor:pointer;" onclick="deletePortfolioItem(${index})">Видалити</span>
                    </div>
                `;
                list.appendChild(div);
            });

            document.getElementById('total-balance').innerText = `$${totalInvested.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        document.getElementById('crypto-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const newAsset = {
                name: document.getElementById('coin-name').value.toUpperCase(),
                price: parseFloat(document.getElementById('coin-price').value),
                amount: parseFloat(document.getElementById('coin-amount').value)
            };
            myPortfolio.push(newAsset);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            this.reset();
            updatePortfolioUI();
        });

        window.deletePortfolioItem = function(index) {
            myPortfolio.splice(index, 1);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            updatePortfolioUI();
        }

        updatePortfolioUI();
        fetchMarketData();

        // Оновлена реєстрація Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW Registered'))
                .catch(err => console.log('SW Error:', err));
        }
    </script>
</body>
</html>
