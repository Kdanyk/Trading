<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto PWA Analytics</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CryptoAnalytix">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #000000; /* True Black для OLED екранів iPhone */
            --card-bg: rgba(28, 28, 30, 0.8);
            --accent-color: #34c759; /* iOS зелений */
            --danger-color: #ff3b30; /* iOS червоний */
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }

        /* Хедер додатка */
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: 700;
            border-bottom: 1px solid #1c1c1e;
        }

        /* Екрани (вкладки) */
        .app-screen {
            display: none;
            padding: 15px;
            animation: fadeIn 0.3s ease;
        }

        .app-screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Віджети та картки */
        .widget {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-title { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; }
        .balance-value { font-size: 32px; font-weight: 800; margin: 5px 0; }
        
        /* Таблиця збережених даних */
        .data-list {
            margin-top: 15px;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-item:last-child { border-bottom: none; }

        /* Форма додавання даних */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #2c2c2e;
            border: none;
            border-radius: 10px;
            color: white;
            margin-bottom: 12px;
            font-size: 16px;
        }
        
        button.btn-submit {
            background: var(--accent-color);
            color: black;
            font-weight: 600;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Контейнер для TradingView */
        .tradingview-container {
            height: 450px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
        }

        /* Нижня навігаційна панель iOS */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(65px + env(safe-area-inset-bottom));
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid #1c1c1e;
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
            text-decoration: none;
            width: 25%;
            background: none;
            border: none;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <header id="screen-title">Дашборд</header>

    <div id="screen-dashboard" class="app-screen active">
        <div class="widget">
            <div class="balance-title">Мій Загальний Баланс</div>
            <div class="balance-value" id="total-balance">$0.00</div>
            <div style="color: var(--accent-color); font-size: 14px;">● Live з ваших даних</div>
        </div>

        <div class="widget" style="padding: 10px; height: 220px;">
            <iframe src="https://s.tradingview.com/embed-widget/markets/?locale=uk#%7B%22filter%22%3A%22crypto%22%2C%22colorTheme%22%3A%22dark%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="screen-analytics" class="app-screen">
        <div class="tradingview-container">
            <iframe src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=uk#%7B%22symbol%22%3A%22BINANCE%3ABTCUSDT%22%2C%22interval%22%3A%22D%22%2C%22timezone%22%3A%22Etc%2FUTC%22%2C%22theme%22%3A%22dark%22%2C%22style%22%3A%221%22%2C%22enable_publishing%22%3Afalse%2C%22hide_side_toolbar%22%3Afalse%2C%22allow_symbol_change%22%3Atrue%2C%22calendar%22%3Afalse%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="screen-mydata" class="app-screen">
        <div class="widget">
            <h3 style="margin-bottom: 15px;">Додати транзакцію / нотатку</h3>
            <form id="crypto-form">
                <input type="text" id="coin-name" placeholder="Назва монети (напр., BTC, ETH)" required>
                <input type="number" step="any" id="coin-amount" placeholder="Кількість монет" required>
                <input type="number" step="any" id="coin-price" placeholder="Ціна покупки ($)" required>
                <button type="submit" class="btn-submit">Зберегти на iPhone</button>
            </form>
        </div>

        <div class="widget">
            <h3>Мої Активи</h3>
            <div class="data-list" id="portfolio-list">
                </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('dashboard', 'Дашборд', this)">
            <div class="nav-icon">📊</div>
            <div>Дашборд</div>
        </button>
        <button class="nav-item" onclick="switchScreen('analytics', 'Графіки TV', this)">
            <div class="nav-icon">📈</div>
            <div>Аналітика</div>
        </button>
        <button class="nav-item" onclick="switchScreen('mydata', 'Мої Дані', this)">
            <div class="nav-icon">💼</div>
            <div>Портфель</div>
        </button>
    </nav>

    <script>
        // Перемикання екранів (Таби)
        function switchScreen(screenId, title, element) {
            document.querySelectorAll('.app-screen').forEach(screen => screen.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById('screen-' + screenId).classList.add('active');
            document.getElementById('screen-title').innerText = title;
            element.classList.add('active');
        }

        // Логіка роботи з даними (Local Storage)
        const cryptoForm = document.getElementById('crypto-form');
        const portfolioList = document.getElementById('portfolio-list');
        const totalBalanceEl = document.getElementById('total-balance');

        // Завантаження збережених даних
        let myPortfolio = JSON.parse(localStorage.getItem('myCryptoPortfolio')) || [];

        function updateUI() {
            portfolioList.innerHTML = '';
            let totalValue = 0;

            if (myPortfolio.length === 0) {
                portfolioList.innerHTML = '<div style="color:var(--text-secondary); text-align:center;">Ваш портфель порожній</div>';
            }

            myPortfolio.forEach((item, index) => {
                const itemValue = item.amount * item.price;
                totalValue += itemValue;

                const div = document.createElement('div');
                div.className = 'data-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.name.toUpperCase()}</strong><br>
                        <span style="font-size:12px; color:var(--text-secondary);">${item.amount} за ціною $${item.price}</span>
                    </div>
                    <div style="text-align: right;">
                        <strong>$${itemValue.toFixed(2)}</strong><br>
                        <span style="color:var(--danger-color); font-size:12px; cursor:pointer;" onclick="deleteItem(${index})">Видалити</span>
                    </div>
                `;
                portfolioList.appendChild(div);
            });

            totalBalanceEl.innerText = `$${totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        // Додавання нового запису
        cryptoForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const newAsset = {
                name: document.getElementById('coin-name').value,
                amount: parseFloat(document.getElementById('coin-amount').value),
                price: parseFloat(document.getElementById('coin-price').value)
            };

            myPortfolio.push(newAsset);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            
            cryptoForm.reset();
            updateUI();
        });

        // Видалення запису
        window.deleteItem = function(index) {
            myPortfolio.splice(index, 1);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            updateUI();
        }

        // Ініціалізація при старті
        updateUI();

        // Реєстрація Service Worker для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker зареєстрований успішно!'))
                .catch(err => console.log('Помилка SW:', err));
        }
    </script>
</body>
</html>
