<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto PWA Analytics</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CryptoAnalytix">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.8);
            --accent-color: #34c759;
            --danger-color: #ff3b30;
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-top: env(safe-area-inset-top); padding-bottom: calc(80px + env(safe-area-inset-bottom)); overflow-x: hidden; }
        header { padding: 20px; font-size: 24px; font-weight: 700; border-bottom: 1px solid #1c1c1e; display: flex; justify-content: space-between; align-items: center; }
        
        .app-screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .app-screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .widget { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .balance-title { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; }
        .balance-value { font-size: 32px; font-weight: 800; margin: 5px 0; }
        
        /* Ринок (Топ 100) */
        .segmented-control { display: flex; background: #1c1c1e; border-radius: 8px; padding: 3px; margin-bottom: 15px; }
        .segment-btn { flex: 1; text-align: center; padding: 8px; border-radius: 6px; font-size: 14px; color: var(--text-secondary); transition: 0.2s; }
        .segment-btn.active { background: #3a3a3c; color: white; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .sort-controls { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .sort-btn { background: #2c2c2e; border: none; color: var(--text-secondary); padding: 6px 12px; border-radius: 12px; font-size: 12px; white-space: nowrap; }
        .sort-btn.active { color: var(--accent-color); background: rgba(52, 199, 89, 0.1); }

        .coin-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .coin-item:last-child { border-bottom: none; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; }
        .coin-price-info { text-align: right; }
        .text-green { color: var(--accent-color); }
        .text-red { color: var(--danger-color); }
        .fav-star { font-size: 20px; color: #444; padding: 0 10px; }
        .fav-star.active { color: #ffd60a; }

        /* Форма портфеля */
        .input-group { position: relative; margin-bottom: 12px; }
        input { width: 100%; padding: 12px; background: #2c2c2e; border: none; border-radius: 10px; color: white; font-size: 16px; }
        button.btn-submit { background: var(--accent-color); color: black; font-weight: 600; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 16px; margin-top: 10px;}
        
        /* Автозаповнення */
        .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #3a3a3c; border-radius: 10px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-top: 5px;}
        .ac-item { padding: 12px; border-bottom: 1px solid #4a4a4c; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .ac-item:last-child { border-bottom: none; }

        .tradingview-container { height: 450px; width: 100%; border-radius: 16px; overflow: hidden; }

        /* Навігація */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(65px + env(safe-area-inset-bottom)); background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #1c1c1e; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 999; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 11px; width: 25%; background: none; border: none; }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <span id="screen-title">Дашборд</span>
    </header>

    <!-- 1: ДАШБОРД -->
    <div id="screen-dashboard" class="app-screen active">
        <div class="widget">
            <div class="balance-title">Вартість портфеля (Вкладено)</div>
            <div class="balance-value" id="total-balance">$0.00</div>
        </div>
        <div class="widget" style="padding: 10px; height: 220px;">
            <iframe src="https://s.tradingview.com/embed-widget/markets/?locale=uk#%7B%22filter%22%3A%22crypto%22%2C%22colorTheme%22%3A%22dark%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <!-- 2: РИНОК ТА УЛЮБЛЕНІ (НОВИЙ ЕКРАН) -->
    <div id="screen-market" class="app-screen">
        <div class="segmented-control">
            <div class="segment-btn active" onclick="setMarketView('all', this)">Топ 100</div>
            <div class="segment-btn" onclick="setMarketView('fav', this)">Улюблені</div>
        </div>

        <div class="sort-controls">
            <button class="sort-btn active" onclick="sortMarket('rank', this)">За капіталізацією</button>
            <button class="sort-btn" onclick="sortMarket('price', this)">За ціною</button>
            <button class="sort-btn" onclick="sortMarket('change', this)">За зміною (24h)</button>
        </div>

        <div class="widget" style="padding: 10px 15px;">
            <div id="market-loading" style="text-align: center; padding: 20px; color: var(--text-secondary);">Завантаження ринку...</div>
            <div id="market-list"></div>
        </div>
    </div>

    <!-- 3: АНАЛІТИКА TV -->
    <div id="screen-analytics" class="app-screen">
        <div class="tradingview-container">
            <iframe src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=uk#%7B%22symbol%22%3A%22BINANCE%3ABTCUSDT%22%2C%22interval%22%3A%22D%22%2C%22theme%22%3A%22dark%22%2C%22style%22%3A%221%22%2C%22hide_side_toolbar%22%3Afalse%2C%22allow_symbol_change%22%3Atrue%7D" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <!-- 4: МОЇ ДАНІ (ПОРТФЕЛЬ) -->
    <div id="screen-mydata" class="app-screen">
        <div class="widget">
            <h3 style="margin-bottom: 15px;">Додати транзакцію</h3>
            <form id="crypto-form">
                <div class="input-group">
                    <input type="text" id="coin-name" placeholder="Почніть вводити назву (напр. Bitcoin)" autocomplete="off" required>
                    <div id="autocomplete-results" class="autocomplete-dropdown"></div>
                </div>
                <div class="input-group">
                    <input type="number" step="any" id="coin-price" placeholder="Ціна покупки ($)" required>
                </div>
                <div class="input-group">
                    <input type="number" step="any" id="coin-amount" placeholder="Кількість монет" required>
                </div>
                <button type="submit" class="btn-submit">Додати до портфеля</button>
            </form>
        </div>

        <div class="widget">
            <h3>Мої Активи</h3>
            <div id="portfolio-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <!-- НАВІГАЦІЯ -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('dashboard', 'Дашборд', this)">
            <div class="nav-icon">📊</div>
            <div>Дашборд</div>
        </button>
        <button class="nav-item" onclick="switchScreen('market', 'Ринок', this)">
            <div class="nav-icon">🌐</div>
            <div>Ринок</div>
        </button>
        <button class="nav-item" onclick="switchScreen('analytics', 'Графіки', this)">
            <div class="nav-icon">📈</div>
            <div>Аналітика</div>
        </button>
        <button class="nav-item" onclick="switchScreen('mydata', 'Портфель', this)">
            <div class="nav-icon">💼</div>
            <div>Портфель</div>
        </button>
    </nav>

    <script>
        // --- ГЛОБАЛЬНІ ЗМІННІ ---
        let marketData = [];
        let currentMarketView = 'all'; // 'all' або 'fav'
        let currentSort = 'rank';
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
        let myPortfolio = JSON.parse(localStorage.getItem('myCryptoPortfolio')) || [];

        // --- ПЕРЕМИКАННЯ ЕКРАНІВ ---
        function switchScreen(screenId, title, element) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            document.getElementById('screen-title').innerText = title;
            element.classList.add('active');
        }

        // --- ЗАВАНТАЖЕННЯ ДАНИХ З COINGECKO ---
        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                marketData = await response.json();
                document.getElementById('market-loading').style.display = 'none';
                renderMarket();
            } catch (error) {
                document.getElementById('market-loading').innerText = 'Помилка завантаження. Перевірте інтернет.';
                console.error("CoinGecko Error:", error);
            }
        }

        // --- ВІДОБРАЖЕННЯ ТА СОРТУВАННЯ РИНКУ ---
        function setMarketView(view, btn) {
            currentMarketView = view;
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMarket();
        }

        function sortMarket(sortType, btn) {
            currentSort = sortType;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMarket();
        }

        function renderMarket() {
            const listContainer = document.getElementById('market-list');
            listContainer.innerHTML = '';

            // Фільтрація (Усі або Улюблені)
            let displayData = currentMarketView === 'fav' 
                ? marketData.filter(coin => myFavorites.includes(coin.id)) 
                : [...marketData];

            if (displayData.length === 0 && currentMarketView === 'fav') {
                listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#8e8e93;">Немає улюблених монет</div>';
                return;
            }

            // Сортування
            if (currentSort === 'price') {
                displayData.sort((a, b) => b.current_price - a.current_price);
            } else if (currentSort === 'change') {
                displayData.sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
            } else {
                displayData.sort((a, b) => a.market_cap_rank - b.market_cap_rank);
            }

            // Рендер списку
            displayData.forEach(coin => {
                const isFav = myFavorites.includes(coin.id);
                const changeClass = coin.price_change_percentage_24h >= 0 ? 'text-green' : 'text-red';
                const changeSymbol = coin.price_change_percentage_24h >= 0 ? '+' : '';

                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `
                    <div class="coin-info">
                        <span class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav('${coin.id}')">${isFav ? '★' : '☆'}</span>
                        <img src="${coin.image}" class="coin-icon" alt="${coin.symbol}">
                        <div>
                            <div style="font-weight:600;">${coin.symbol.toUpperCase()}</div>
                            <div style="font-size:12px; color:var(--text-secondary);">${coin.name}</div>
                        </div>
                    </div>
                    <div class="coin-price-info">
                        <div style="font-weight:600;">$${coin.current_price.toLocaleString()}</div>
                        <div class=" ${changeClass}" style="font-size:12px;">
                            ${changeSymbol}${coin.price_change_percentage_24h.toFixed(2)}%
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // --- ДОДАВАННЯ/ВИДАЛЕННЯ З УЛЮБЛЕНИХ ---
        window.toggleFav = function(coinId) {
            if (myFavorites.includes(coinId)) {
                myFavorites = myFavorites.filter(id => id !== coinId);
            } else {
                myFavorites.push(coinId);
            }
            localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
            renderMarket();
        }

        // --- АВТОЗАПОВНЕННЯ В ПОРТФЕЛІ ---
        const searchInput = document.getElementById('coin-name');
        const priceInput = document.getElementById('coin-price');
        const acDropdown = document.getElementById('autocomplete-results');

        searchInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            acDropdown.innerHTML = '';
            
            if (!val) {
                acDropdown.style.display = 'none';
                return;
            }

            const matches = marketData.filter(c => c.name.toLowerCase().includes(val) || c.symbol.toLowerCase().includes(val)).slice(0, 5);
            
            if (matches.length > 0) {
                acDropdown.style.display = 'block';
                matches.forEach(coin => {
                    const div = document.createElement('div');
                    div.className = 'ac-item';
                    div.innerHTML = `<img src="${coin.image}" style="width:20px;"> <span>${coin.name} (${coin.symbol.toUpperCase()})</span>`;
                    
                    div.onclick = function() {
                        searchInput.value = coin.symbol.toUpperCase();
                        priceInput.value = coin.current_price; // Автоматично підтягуємо ціну!
                        acDropdown.style.display = 'none';
                    };
                    acDropdown.appendChild(div);
                });
            } else {
                acDropdown.style.display = 'none';
            }
        });

        // Ховаємо підказки при кліці поза ними
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !acDropdown.contains(e.target)) acDropdown.style.display = 'none';
        });

        // --- ЛОГІКА ПОРТФЕЛЯ ---
        function updatePortfolioUI() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = '';
            let totalInvested = 0;

            if (myPortfolio.length === 0) {
                list.innerHTML = '<div style="color:var(--text-secondary); text-align:center;">Ваш портфель порожній</div>';
            }

            myPortfolio.forEach((item, index) => {
                const itemValue = item.amount * item.price;
                totalInvested += itemValue;

                const div = document.createElement('div');
                div.className = 'coin-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        <span style="font-size:12px; color:var(--text-secondary);">${item.amount} шт. по $${item.price}</span>
                    </div>
                    <div style="text-align: right;">
                        <strong>$${itemValue.toFixed(2)}</strong><br>
                        <span class="text-red" style="font-size:12px; cursor:pointer;" onclick="deletePortfolioItem(${index})">Видалити</span>
                    </div>
                `;
                list.appendChild(div);
            });

            document.getElementById('total-balance').innerText = `$${totalInvested.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        document.getElementById('crypto-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const newAsset = {
                name: document.getElementById('coin-name').value.toUpperCase(),
                price: parseFloat(document.getElementById('coin-price').value),
                amount: parseFloat(document.getElementById('coin-amount').value)
            };
            myPortfolio.push(newAsset);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            this.reset();
            updatePortfolioUI();
        });

        window.deletePortfolioItem = function(index) {
            myPortfolio.splice(index, 1);
            localStorage.setItem('myCryptoPortfolio', JSON.stringify(myPortfolio));
            updatePortfolioUI();
        }

        // --- ІНІЦІАЛІЗАЦІЯ ---
        updatePortfolioUI();
        fetchMarketData(); // Завантажуємо ринок при старті

    </script>
</body>
</html>
